<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>SD-WAN 隧道测试页</title>
<style>
  body {
    font-family: "Microsoft YaHei", sans-serif;
    background: #0f172a; color: #e2e8f0;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; margin: 0;
  }
  .box { text-align: center; }
  h1 { color: #22c55e; font-size: 32px; }
  p { color: #94a3b8; }
  .ip { color: #fbbf24; font-family: Consolas, monospace; font-size: 20px; }
</style>
</head>
<body>
<div class="box">
  <h1>✓ 隧道通了</h1>
  <p>你能看到这个页面,说明 B 已经通过 SD-WAN 隧道访问到 A 的网页服务</p>
  <p>目标地址:<span class="ip">10.66.0.2:8000</span></p>
  <p id="t"></p>
</div>
<script>document.getElementById("t").textContent = "访问时间: " + new Date().toLocaleString();</script>
</body>
</html>
